<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC-tree — CLAUDE.md 上下文地图</title>
<style>
:root {
  --bg: #ffffff;
  --bg-sidebar: #fafafa;
  --bg-card: #ffffff;
  --border: #e5e7eb;
  --text-primary: #1f2937;
  --text-secondary: #6b7280;
  --text-tertiary: #9ca3af;
  --accent: #2563eb;
  --accent-light: #eff6ff;
  --accent-hover: #1d4ed8;
  --tag-user: #dbeafe;
  --tag-user-text: #1e40af;
  --tag-project: #dcfce7;
  --tag-project-text: #166534;
  --tag-sub: #fef3c7;
  --tag-sub-text: #92400e;
  --hover-bg: #f3f4f6;
  --active-bg: #eff6ff;
  --depth-0: #3b82f6;
  --depth-1: #22c55e;
  --depth-2: #f59e0b;
  --depth-3: #a855f7;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  --font-mono: "SF Mono", "Cascadia Code", "JetBrains Mono", monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1a2e;
    --bg-sidebar: #16213e;
    --bg-card: #1a1a2e;
    --border: #2a2a4a;
    --text-primary: #e4e4e7;
    --text-secondary: #a1a1aa;
    --text-tertiary: #71717a;
    --accent: #60a5fa;
    --accent-light: #1e293b;
    --accent-hover: #93bbfc;
    --tag-user: #1e3a5f;
    --tag-user-text: #93c5fd;
    --tag-project: #14532d;
    --tag-project-text: #86efac;
    --tag-sub: #78350f;
    --tag-sub-text: #fdba74;
    --hover-bg: #27272a;
    --active-bg: #1e293b;
    --depth-0: #60a5fa;
    --depth-1: #4ade80;
    --depth-2: #fbbf24;
    --depth-3: #c084fc;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
  }
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text-primary);font-size:14px;line-height:1.5}
a{color:var(--accent);text-decoration:none}

/* Header */
header{padding:16px 24px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between}
header h1{font-size:16px;font-weight:600;color:var(--text-primary)}
header h1 span{color:var(--accent)}
header .subtitle{font-size:12px;color:var(--text-secondary);margin-top:2px}
.header-actions{display:flex;gap:8px;align-items:center}
.header-actions .refresh-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text-secondary);cursor:pointer;font-size:12px;font-family:inherit}
.header-actions .refresh-btn:hover{background:var(--hover-bg);color:var(--text-primary)}
.header-actions .status{font-size:12px;color:var(--text-tertiary)}

/* Layout */
.layout{display:flex;height:calc(100vh - 57px)}
.sidebar{width:320px;min-width:280px;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg-sidebar);padding:12px}
.main{flex:1;overflow-y:auto;padding:24px 32px;background:var(--bg)}

/* Sidebar tree */
.sidebar-header{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-tertiary);margin-bottom:12px;padding:0 8px}
.group{margin-bottom:4px}
.group-header{padding:6px 8px;border-radius:6px;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--text-primary);cursor:default}
.group-header .count{color:var(--text-tertiary);font-weight:400;margin-left:auto;font-size:11px}
.file-item{padding:5px 8px 5px 20px;cursor:pointer;border-radius:6px;font-size:13px;color:var(--text-secondary);display:flex;align-items:center;gap:6px;transition:all 0.1s;margin:1px 0;border-left:3px solid transparent}
.file-item[data-depth="0"]{border-left-color:var(--depth-0)}
.file-item[data-depth="1"]{border-left-color:var(--depth-1)}
.file-item[data-depth="2"]{border-left-color:var(--depth-2)}
.file-item[data-depth="3"]{border-left-color:var(--depth-3)}
.file-item:hover{color:var(--text-primary);background:var(--hover-bg)}
.file-item.active{color:var(--accent);background:var(--active-bg);font-weight:500}
.file-item .file-icon{font-size:14px;opacity:0.7}
.file-item .file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .size{color:var(--text-tertiary);font-size:11px}

/* Main content */
.main-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-tertiary);font-size:14px;flex-direction:column;gap:8px}
.main-empty .empty-icon{font-size:36px;opacity:0.4}
.preview-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px}
.preview-header .file-title{font-size:18px;font-weight:600;color:var(--text-primary);line-height:1.3}
.preview-header .file-path{font-size:12px;color:var(--text-tertiary);margin-top:2px;word-break:break-all;font-family:var(--font-mono)}
.preview-header .actions{display:flex;gap:8px;flex-shrink:0}
.btn{padding:6px 14px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;border:1px solid var(--border);background:var(--bg);color:var(--text-secondary);transition:all 0.1s}
.btn:hover{background:var(--hover-bg);color:var(--text-primary)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover)}

/* Meta tags row */
.meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tag{padding:2px 10px;border-radius:12px;font-size:11px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.tag-user{background:var(--tag-user);color:var(--tag-user-text)}
.tag-project{background:var(--tag-project);color:var(--tag-project-text)}
.tag-sub{background:var(--tag-sub);color:var(--tag-sub-text)}

/* Content sections */
.section{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.section-header{padding:10px 16px;font-size:12px;font-weight:600;color:var(--text-secondary);background:var(--bg-sidebar);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.section-body{padding:16px;font-size:13px;line-height:1.7;white-space:pre-wrap;color:var(--text-primary);max-height:500px;overflow-y:auto}
.section-body.mono{font-family:var(--font-mono);font-size:12px;line-height:1.5}

/* Headings in content preview */
.section-body .heading-line{color:var(--text-tertiary);font-family:var(--font-mono);font-size:12px}
.section-body .heading-line.level-1{padding-left:0}
.section-body .heading-line.level-2{padding-left:16px}
.section-body .heading-line.level-3{padding-left:32px}
.section-body .heading-line.level-4{padding-left:48px}

/* Merge preview sections */
.merge-entry{padding:8px 0}
.merge-entry+.merge-entry{border-top:1px solid var(--border);margin-top:8px;padding-top:12px}
.merge-entry .merge-file-label{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:4px;font-family:var(--font-mono)}
.merge-entry .merge-content-snip{font-size:12px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap;font-family:var(--font-mono)}
.merge-entry .merge-more{font-size:11px;color:var(--text-tertiary);margin-top:4px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.25s;pointer-events:none;z-index:100;box-shadow:var(--shadow)}
.toast.show{opacity:1}
.toast-success{background:#059669;color:#fff}
.toast-error{background:#dc2626;color:#fff}

/* Filter dropdown */
.filter-select{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text-primary);font-size:12px;font-family:inherit;cursor:pointer;max-width:220px;min-width:120px}
.filter-select:focus{outline:none;border-color:var(--accent)}

/* Project groups in sidebar */
.project-group{margin-bottom:8px}
.project-group-title{padding:4px 8px;font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:2px;border-bottom:1px solid var(--border);padding-bottom:4px}
.project-group-title .project-count{font-weight:400;text-transform:none;letter-spacing:0;margin-left:4px}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text-tertiary);font-size:13px}
</style>
</head>
<body>

<header>
  <div>
    <h1><span>CC-tree</span> — CLAUDE.md 上下文地图</h1>
    <div class="subtitle" id="header-subtitle">全局扫描所有项目下的 CLAUDE.md</div>
  </div>
  <div class="header-actions">
    <select class="filter-select" id="project-filter" onchange="onProjectFilterChange()">
      <option value="">所有项目</option>
    </select>
    <span class="status" id="status"></span>
    <button class="refresh-btn" onclick="loadData()">重新扫描</button>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
      <div class="sidebar-header">
        <span>文件层级</span>
        <span class="count" id="total-count"></span>
      </div>
    <div id="tree-container"><div class="loading">正在扫描...</div></div>
  </div>
  <div class="main" id="main-panel">
    <div class="main-empty">
      <div class="empty-icon">📄</div>
      <div>从左侧选择一个文件查看详情</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
