<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC-tree — Claude 上下文地图</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'SF Mono',Monaco,'Cascadia Code',monospace;background:#0d1117;color:#e6edf3;min-height:100vh}
header{padding:16px 20px;border-bottom:1px solid #21262d;background:#0d1117}
header h1{font-size:16px;font-weight:600;color:#e6edf3}
header h1 span{color:#58a6ff}
header .subtitle{font-size:11px;color:#8b949e;margin-top:2px}
.layout{display:flex;height:calc(100vh - 80px)}
.sidebar{width:360px;min-width:300px;border-right:1px solid #21262d;overflow-y:auto;background:#0d1117;padding:12px}
.main{flex:1;overflow-y:auto;padding:20px;background:#161b22}
.sidebar-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#8b949e;margin-bottom:8px}
.group-header{padding:6px 10px;margin-top:8px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#e6edf3;background:#161b22;border:1px solid #21262d}
.group-header:hover{background:#1c2333}
.group-header .count{color:#8b949e;font-weight:400;margin-left:auto;font-size:11px}
.file-item{padding:5px 10px 5px 26px;cursor:pointer;border-radius:4px;font-size:12px;color:#8b949e;display:flex;align-items:center;gap:6px;transition:all .1s}
.file-item:hover{color:#e6edf3;background:#1c2333}
.file-item.active{color:#58a6ff;background:#1c2333}
.file-item .priority{color:#e3b341;font-size:10px}
.file-item .size{color:#484f58;font-size:10px;margin-left:auto}
.preview-header{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.preview-header .actions{display:flex;gap:8px}
.btn{font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;font-family:inherit;border:1px solid #30363d;background:#21262d;color:#e6edf3}
.btn:hover{background:#30363d}
.btn-primary{background:#1f4e79;border-color:#58a6ff;color:#58a6ff}
.btn-primary:hover{background:#2d6a9f}
.path-text{font-size:11px;color:#484f58;margin-bottom:12px;word-break:break-all}
.content-preview{font-size:12px;line-height:1.6;color:#e6edf3;white-space:pre-wrap}
.content-preview h1::before{content:'# ';color:#58a6ff}
.content-preview h2::before{content:'## ';color:#58a6ff}
.copy-toast{position:fixed;bottom:20px;right:20px;background:#3fb950;color:#0d1117;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none}
.copy-toast.show{opacity:1}
.merge-section{margin-top:20px}
.merge-section h3{font-size:12px;font-weight:600;color:#8b949e;margin-bottom:8px}
.merge-content{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:12px;font-size:11px;line-height:1.5;white-space:pre-wrap;color:#e6edf3;max-height:300px;overflow-y:auto}
.merge-content .file-sep{color:#FFA500;font-weight:600}
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:#8b949e;font-size:13px}
</style>
</head>
<body>
<header>
  <h1><span>CC-tree</span> — Claude 上下文地图</h1>
  <div class="subtitle">扫描当前工作路径下的 CLAUDE.md 层级结构</div>
</header>
<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">📁 CLAUDE.md 层级树</div>
    <div id="tree-container"><div class="loading">正在扫描...</div></div>
  </div>
  <div class="main" id="main-panel">
    <div class="loading" style="height:200px">← 从左侧选择一个文件查看内容</div>
  </div>
</div>
<div class="copy-toast" id="toast">已复制到剪贴板</div>
<script src="app.js"></script>
</body>
</html>
